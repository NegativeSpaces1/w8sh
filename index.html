<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRIGO SYSTEM</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: grey; --bg: #050505; }
        body { background: var(--bg); color: #d1d1d1; font-family: 'Courier Prime', monospace; margin: 0; text-transform: uppercase; user-select: none; }
        .header { background: #111; padding: 20px; border-bottom: 3px solid var(--accent); text-align: center; letter-spacing: 5px; }
        .nav { display: flex; background: #111; }
        .nav button { flex: 1; padding: 15px; background: transparent; color: #444; border: none; font-family: 'Courier Prime'; border-bottom: 2px solid #222; }
        .nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #1a1a1a; }
        .container { padding: 40px 20px; text-align: center; height: 70vh; display: flex; flex-direction: column; justify-content: center; }
        .hidden { display: none; }
        .girigo-btn { background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 25px; width: 100%; font-size: 1.2rem; font-weight: bold; box-shadow: 0 0 10px rgba(255, 69, 0, 0.2); }
        .girigo-btn:active { background: var(--accent); color: #000; }
        #status { font-size: 1.5rem; color: var(--accent); margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">GIRIGO SYSTEM</div>
    <div class="nav">
        <button id="btnA" onclick="switchMode('A')" class="active">SENDER</button>
        <button id="btnB" onclick="switchMode('B')">RECEIVER</button>
    </div>

    <div id="modeA" class="container">
        <button class="girigo-btn" onclick="sendSignal()">EXECUTE: GRANT WISH</button>
    </div>

    <div id="modeB" class="container hidden">
        <div id="status">SCANNING...</div>
        <button class="girigo-btn" style="margin-top:40px; border-color: #444; color: #444;" onclick="initSystem()">INITIALIZE SYSTEM</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPvvFwAxh10gtWJTPLwNXOVrBauBMjOAc",
            databaseURL: "https://girigo-89019-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "girigo-89019",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        function switchMode(mode) {
            document.getElementById('modeA').classList.toggle('hidden', mode !== 'A');
            document.getElementById('modeB').classList.toggle('hidden', mode !== 'B');
            document.getElementById('btnA').classList.toggle('active', mode === 'A');
            document.getElementById('btnB').classList.toggle('active', mode === 'B');
        }

        function initSystem() {
            Notification.requestPermission().then(perm => { if(perm === 'granted') alert("GIRIGO ONLINE"); });
        }

        function sendSignal() {
            db.ref('projectX/signal').set({ type: "GRANT", ts: Date.now() });
        }

        db.ref('projectX/signal').on('value', (snap) => {
            const data = snap.val();
            if (data && data.type === "GRANT") {
                document.getElementById('status').innerText = "YOUR WISH IS HAS BEEN GRANTED!";
                new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
                if (Notification.permission === "granted") {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification("GIRIGO SYSTEM", {
                            body: "Your wish is has been granted!",
                            vibrate: [500, 110, 500],
                            tag: 'girigo-notif',
                            renotify: true
                        });
                    });
                }
                setTimeout(() => { document.getElementById('status').innerText = "SCANNING..."; }, 7000);
            }
        });
    </script>
</body>
</html>
